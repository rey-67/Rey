<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add a Movie</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #1b2a4a;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      background-color: #2e3f63;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      padding: 32px;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      text-align: center;
      font-size: 1.6rem;
      margin-bottom: 24px;
      color: #e0e6f0;
    }

    label {
      display: block;
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: #b0bcd4;
    }

    input[type="text"],
    select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #4a5f85;
      border-radius: 6px;
      font-size: 0.95rem;
      margin-bottom: 18px;
      background-color: #1b2a4a;
      color: #e0e6f0;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus,
    select:focus {
      border-color: #7a9fd4;
      outline: none;
    }

    input[type="text"]::placeholder {
      color: #6a7f9a;
    }

    .star-rating {
      display: flex;
      flex-direction: row-reverse;
      justify-content: flex-end;
      margin-bottom: 24px;
      gap: 4px;
    }

    .star-rating input[type="radio"] {
      display: none;
    }

    .star-rating label {
      font-size: 2rem;
      color: #ccc;
      cursor: pointer;
      margin-bottom: 0;
      transition: color 0.2s;
    }

    .star-rating input[type="radio"]:checked ~ label,
    .star-rating label:hover,
    .star-rating label:hover ~ label {
      color: #f5a623;
    }

    .btn-add {
      width: 100%;
      padding: 12px;
      background-color: #3a5f9e;
      color: #e0e6f0;
      font-size: 1rem;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.2s;
      margin-bottom: 28px;
    }

    .btn-add:hover {
      background-color: #2e4f85;
    }

    h2 {
      text-align: center;
      font-size: 1.2rem;
      color: #e0e6f0;
      margin-bottom: 14px;
    }

    .movie-item {
      background-color: #1b2a4a;
      border: 1px solid #4a5f85;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 10px;
      font-size: 0.9rem;
      color: #b0bcd4;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .movie-stars {
      color: #f5a623;
      font-size: 1.1rem;
      margin-left: 8px;
    }

    .empty-msg {
      text-align: center;
      color: #6a7f9a;
      font-size: 0.9rem;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Add a Movie</h1>

    <label for="title">Title:</label>
    <input type="text" id="title" placeholder="Enter movie title" />

    <label for="year">Year:</label>
    <input type="text" id="year" placeholder="Enter release year" />

    <label for="genre">Genre:</label>
    <select id="genre">
      <option value="Action">Action</option>
      <option value="Comedy">Comedy</option>
      <option value="Drama">Drama</option>
      <option value="Horror">Horror</option>
      <option value="Romance">Romance</option>
      <option value="Sci-Fi">Sci-Fi</option>
      <option value="Thriller">Thriller</option>
      <option value="Animation">Animation</option>
    </select>

    <label>Rating:</label>
    <div class="star-rating">
      <input type="radio" id="star5" name="rating" value="5" />
      <label for="star5">&#9733;</label>
      <input type="radio" id="star4" name="rating" value="4" />
      <label for="star4">&#9733;</label>
      <input type="radio" id="star3" name="rating" value="3" />
      <label for="star3">&#9733;</label>
      <input type="radio" id="star2" name="rating" value="2" />
      <label for="star2">&#9733;</label>
      <input type="radio" id="star1" name="rating" value="1" />
      <label for="star1">&#9733;</label>
    </div>

    <button class="btn-add" onclick="addMovie()">Add Movie</button>

    <h2>Movie List</h2>
    <div id="movieList"></div>
  </div>

  <script>
    window.onload = function () {
      renderMovies();
    };

    function addMovie() {
      const title = document.getElementById("title").value.trim();
      const year = document.getElementById("year").value.trim();
      const genre = document.getElementById("genre").value;
      const ratingInput = document.querySelector('input[name="rating"]:checked');

      if (!title || !year || !ratingInput) {
        alert("Please fill in all fields and select a rating.");
        return;
      }

      const newMovie = {
        title: title,
        year: year,
        genre: genre,
        rating: ratingInput.value
      };

      const existingMovies = JSON.parse(localStorage.getItem("movies")) || [];
      existingMovies.push(newMovie);
      localStorage.setItem("movies", JSON.stringify(existingMovies));

      document.getElementById("title").value = "";
      document.getElementById("year").value = "";
      document.getElementById("genre").value = "Action";
      document.querySelectorAll('input[name="rating"]').forEach(r => r.checked = false);

      renderMovies();
    }

    function renderMovies() {
      const movieList = document.getElementById("movieList");
      const movies = JSON.parse(localStorage.getItem("movies")) || [];

      movieList.innerHTML = "";

      if (movies.length === 0) {
        movieList.innerHTML = '<p class="empty-msg">No movies added yet.</p>';
        return;
      }

      movies.forEach(function (movie) {
        const stars = "★".repeat(parseInt(movie.rating)) + "☆".repeat(5 - parseInt(movie.rating));
        const item = document.createElement("div");
        item.classList.add("movie-item");
        item.innerHTML = `
          <span>${movie.title} (${movie.year}) - ${movie.genre}, Rating:</span>
          <span class="movie-stars">${stars}</span>
        `;
        movieList.appendChild(item);
      });
    }
  </script>
</body>
</html>
